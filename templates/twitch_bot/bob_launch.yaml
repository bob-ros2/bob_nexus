# Twitch Chat  Bot Template
- &entity_ns "__ns:=${ROOT_NS:-/bob}/${NAME}"

# from https://github.com/bob-ros2/tioros
- name: twitch_bot
  package: tioros
  executable: chatbot
  output: screen
  arguments:
    - --ros-args
    - -p
    - 'channel:=${TWITCH_CHAT_CHANNEL:-"bobassi"}'
    - -p
    - 'credentials:=${TWITCH_CHAT_CREDENTIALS:-"no_credentials"}'
    - -r
    - *entity_ns
