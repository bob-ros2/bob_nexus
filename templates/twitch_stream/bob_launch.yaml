# Twitch Bot Template - Combined Brain & Vision
# Includes nested namespaces:
# - Viz: ${ROOT_NS}/${NAME}
# - LLM: ${ROOT_NS}/${NAME}/llm

- &entity_ns "__ns:=${ROOT_NS}/${NAME}"
- &llm_ns "__ns:=${ROOT_NS}/${NAME}/llm"

# 1. The Dashboard (Visual Head - with FFmpeg Streaming)
- name: streamer
  package: bob_sdlviz
  executable: start_stream.sh
  output: screen
  arguments:
    - --ros-args
    - -r
    - __node:=streamer
    - -r
    - *entity_ns

# 2. The Agent Logic (Cognitive Core)
- name: brain
  package: bob_llm
  executable: llm
  output: screen
  arguments:
    - --ros-args
    - -p
    - api_url:=${API_URL}
    - -p
    - api_key:=${API_KEY}
    - -p
    - api_model:=${API_MODEL}
    - -p
    - "eof:='&nbsp;⚜️<br>'"
    - -p
    - system_prompt:=./system_prompt.txt
    - -p
    - "tool_interfaces:=['./ros2_ws/src/bob_llm/config/qdrant_tools.py', './skill_tools.py']"
    - --log-level
    - debug
    - -r
    - *llm_ns

# 3. Get latest overlay
- name: sdlviz_events
  package: bob_llm
  executable: /bin/bash
  output: screen
  arguments:
    - -c
    - -c
    - "source /opt/ros/${ROS_DISTRO:-humble}/setup.bash && stdbuf -oL PYTHONUNBUFFERED=1 ros2 topic echo ${ROOT_NS}/${NAME}/events_changed --field data | while read -r line; do [ \"$line\" != \"---\" ] && echo \"$line\" > ./events_stat.yaml; done #"
