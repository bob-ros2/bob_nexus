# Twitch Bot Template - Combined Brain & Vision
# Includes nested namespaces:
# - Viz: ${ROOT_NS}/${NAME}
# - LLM: ${ROOT_NS}/${NAME}/llm

- &entity_ns "__ns:=${ROOT_NS}/${NAME}"
- &llm_ns "__ns:=${ROOT_NS}/${NAME}/llm"

# 1. The Dashboard (Visual Head - with FFmpeg Streaming)
- name: streamer
  package: bob_sdlviz
  executable: start_stream.sh
  output: screen
  arguments:
    - --ros-args
    - -r
    - __node:=streamer
    - -r
    - *entity_ns

# 2. The Agent Logic (Cognitive Core)
- name: brain
  package: bob_llm
  executable: llm
  output: screen
  arguments:
    - --ros-args
    - -p
    - api_url:=${API_URL}
    - -p
    - api_key:=${API_KEY}
    - -p
    - api_model:=${API_MODEL}
    - -p
    - "system_prompt:=${SYSTEM_PROMPT}"
    - -p
    - "tool_interfaces:=['./ros2_ws/src/bob_llm/config/qdrant_tools.py', '/app/master/core/skill_tools.py']"
    - -r
    - *llm_ns
